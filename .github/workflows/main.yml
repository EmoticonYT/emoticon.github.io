name: Run Site via Cloudflare Tunnel
on: [push]

jobs:
  serve:
    runs-on: macos-latest  # As requested for macOS
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Setup Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Start Site and Tunnel
        run: |
          # 1. Start the dev server in the background
          npm run docs:dev &
          
          # 2. Wait for the server to initialize (adjust seconds if needed)
          sleep 15
          
          # 3. Create a temporary tunnel. 
          # This will print the URL in the logs.
          # We use 'timeout' to stop the job after 30 minutes.
          timeout 30m cloudflared tunnel --url http://localhost:5173
